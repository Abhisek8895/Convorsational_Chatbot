<!DOCTYPE html>
<html>
<head>
    <title>Login - Conversational Chatbot</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, Helvetica, sans-serif;
            background-color:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-container{
            background:#1e293b;
            padding:40px;
            border-radius:10px;
            width:320px;
            box-shadow:0 0 10px rgba(0,0,0,0.5);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        form p{
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:10px;
            border:none;
            border-radius:6px;
            margin-top:5px;
            background:#334155;
            color:white;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            background:#2563eb;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .signup-link{
            text-align:center;
            margin-top:15px;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
        }

        a:hover{
            text-decoration:underline;
        }

    </style>

</head>
<body>

<div class="login-container">

<h2>Login</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Login</button>
</form>

<div class="signup-link">
    Don't have an account? <a href="/signup/">Sign up</a>
</div>

</div>

</body>
</html>
