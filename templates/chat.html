<!DOCTYPE html>
<html>
<head>
    <title>Chat with AI</title>
</head>
<body>

<h2>Chat with AI</h2>

<div id="chat-box">
    {% for msg in messages %}

        {% if msg.role == "user" %}
            <p><strong>You:</strong> {{ msg.message }}</p>
        {% else %}
            <p><strong>AI:</strong> {{ msg.message }}</p>
        {% endif %}

    {% empty %}
        <p>No messages yet. Start the conversation!</p>

    {% endfor %}
</div>

<hr>

<form method="post">
    {% csrf_token %}
    
    <input 
        type="text" 
        name="message" 
        placeholder="Type your message..." 
        required
    >

    <button type="submit">Send</button>

</form>

</body>
</html>
