<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - Conversational Chatbot</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    background-color:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.signup-container{
    background:#1e293b;
    padding:40px;
    border-radius:10px;
    width:340px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    margin-bottom:15px;
    background:#334155;
    color:white;
    font-size:14px;
}

input:focus{
    outline:none;
    background:#475569;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#10b981;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#059669;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

a{
    color:#38bdf8;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="signup-container">

<h2>Create Account</h2>

<form method="POST">
{% csrf_token %}

<label>Username</label>
{{ form.username }}

<label>Email</label>
{{ form.email }}

<label>Password</label>
{{ form.password1 }}

<label>Confirm Password</label>
{{ form.password2 }}

<button type="submit">Sign Up</button>

</form>

<div class="login-link">
Already have an account? <a href="/login/">Login</a>
</div>

</div>

</body>
</html>
